<!DOCTYPE html>
<html lang="{{ site.language }}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}{{ site.title }}{% endblock %}</title>
{% block meta %}{% endblock %}
{% if canonical_url %}<link rel="canonical" href="{{ canonical_url }}">{% endif %}
<link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="/index.xml">
<link rel="alternate" type="application/feed+json" title="{{ site.title }}" href="/feed.json">
<link rel="webmention" href="{{ site.webmention.endpoint }}">
<link rel="pingback" href="{{ site.webmention.pingback }}">
<link rel="stylesheet" href="/style.css">
</head>
<body>
<header class="site-header">
<nav>
<a href="/">{{ site.title }}</a>
<a href="/notes/">notes</a>
<a href="/about/">about</a>
<a href="/colophon/">colophon</a>
</nav>
</header>
<main>
{% block content %}{% endblock %}
</main>
<footer class="site-footer">
<p>
<a href="/index.xml">RSS</a> ·
<a href="/feed.json">JSON Feed</a> ·
<a href="/colophon/">Colophon</a>
</p>
</footer>
</body>
</html>
