name: Deploy bliki to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  # Pin the Quartz version for reproducible builds.
  # Bump this deliberately — don't use `main` or `v4` (a moving target).
  # Latest tags: https://github.com/jackyzha0/quartz/releases
  QUARTZ_VERSION: v4

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site
        uses: actions/checkout@v4
        with:
          path: site
          fetch-depth: 0   # Quartz uses git history for created/modified dates

      - name: Clone Quartz
        run: |
          git clone --depth 1 --branch "$QUARTZ_VERSION" \
            https://github.com/jackyzha0/quartz.git quartz

      - name: Overlay content & config
        run: |
          rm -rf quartz/content
          cp -r site/content quartz/content
          cp site/quartz.config.ts quartz/quartz.config.ts
          cp site/quartz.layout.ts quartz/quartz.layout.ts

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: quartz
        run: npm ci

      - name: Build site
        working-directory: quartz
        run: npx quartz build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: quartz/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
